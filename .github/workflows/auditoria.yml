name: 🛡️ AGENTE AUDITOR ARUME V13

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  issues: write

jobs:
  audit_and_backup:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🧱 Preparar Motor
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔬 Ejecutar CFO Virtual
        id: audit
        continue-on-error: true # Para que aunque falle el audit, envíe el Telegram
        run: npx tsx src/scripts/audit.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}

      - name: 📄 Guardar Backup y Reporte
        uses: actions/upload-artifact@v4
        with:
          name: arume-auditoria-backup
          path: out/
          retention-days: 30

      - name: 📣 Enviar Informe a Telegram
        run: |
          # Leemos el resumen generado por el script
          REPORT_BODY=$(cat out/audit-summary.md)
          
          # Enviamos el mensaje por Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${REPORT_BODY}" \
            -d "parse_mode=Markdown"

      - name: 🚨 Crear Issue si hay peligro
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.existsSync('out/audit-summary.md') ? fs.readFileSync('out/audit-summary.md','utf8') : 'Error al generar resumen.';
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 ACCIÓN REQUERIDA: Anomalía Contable Detectada',
              body: summary,
              labels: ['bug', 'auditoria']
            })
