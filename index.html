<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#f8fafc" />
    <meta name="color-scheme" content="light dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Arume PRO">
    
    <title>Arume ERP | Profesional</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/vite.svg" />

    <style>
      /* Evitar rebotes y scrolls fantasma en Android/iOS */
      html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow-x: hidden;
        overflow-y: hidden; /* El scroll lo manejará el div root o el App.tsx */
        overscroll-behavior-y: none;
        background-color: #f8fafc; /* Gris muy claro, elegante (slate-50) */
        color: #0f172a;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        
        /* Protecciones de Safe Area para la Dynamic Island y el dock de iOS */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        
        /* Evita el highlight azul horrible al tocar botones en móvil */
        -webkit-tap-highlight-color: transparent;
      }

      /* 🪄 6. FADE-IN PROFESIONAL: Evita el pantallazo blanco al cargar React */
      #root {
        opacity: 0;
        transition: opacity 0.4s ease-out;
        width: 100%;
        height: 100%;
      }
      body.loaded #root {
        opacity: 1;
      }

      /* 🔍 FIX ZOOM SAFARI: Los inputs DEBEN tener 16px min en móvil para que Safari no haga zoom, 
         luego con Tailwind los encogemos visualmente si hace falta */
      @media screen and (max-width: 768px) {
        input, select, textarea {
          font-size: 16px !important;
        }
      }
    </style>
  </head>
  
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      window.addEventListener("load", () => {
        requestAnimationFrame(() => {
          document.body.classList.add("loaded");
        });
      });
    </script>
  </body>
</html>
