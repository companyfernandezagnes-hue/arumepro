<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="color-scheme" content="light dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Arume PRO">
    
    <title>Arume ERP | Profesional</title>

    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5z'/%3E%3Cpath d='M2 17l10 5 10-5'/%3E%3Cpath d='M2 12l10 5 10-5'/%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5z'/%3E%3Cpath d='M2 17l10 5 10-5'/%3E%3Cpath d='M2 12l10 5 10-5'/%3E%3C/svg%3E" />

    <style>
      /* 🚀 FIX SCROLL: Limpiamos las reglas que bloqueaban la rueda del ratón */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        background-color: #f8fafc;
        color: #0f172a;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        
        /* Solo bloqueamos el scroll horizontal por seguridad */
        overflow-x: hidden;
        
        /* Protecciones de Safe Area para la Dynamic Island y el dock de iOS */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        
        -webkit-tap-highlight-color: transparent;
      }

      /* 🪄 FADE-IN PROFESIONAL */
      #root {
        opacity: 0;
        transition: opacity 0.4s ease-out;
        width: 100%;
        min-height: 100vh; /* Dejamos que crezca libremente hacia abajo */
        display: flex;
        flex-direction: column;
      }
      body.loaded #root {
        opacity: 1;
      }

      /* 🔍 FIX ZOOM SAFARI */
      @media screen and (max-width: 768px) {
        input, select, textarea {
          font-size: 16px !important;
        }
      }
    </style>
  </head>
  
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      window.addEventListener("load", () => {
        requestAnimationFrame(() => {
          document.body.classList.add("loaded");
        });
      });
    </script>
  </body>
</html>
